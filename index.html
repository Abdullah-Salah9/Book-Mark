<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans+Caption:wght@400;700&family=Pacifico&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Book Mark</title>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center">Bookmaker</h1>
        <div class="bookbox row">
            <div class="col-12">
                <h2 class="text-center"><i class="fa-solid fa-bookmark"></i> Bookmark your favorite sites <i class="fa-solid fa-bookmark"></i> </h2>
            </div>
            <div class="col-12 d-flex flex-column">
                <label for="Bookmark" class="pb-2 fw-semibold"><i class="fa-solid fa-book me-2"></i> Site Name</label>
                <input type="text" class="form-control " placeholder="Bookmark Name" id="Bookmark">
            </div>
            <div class="col-12 d-flex flex-column pt-3">
                <label for="bookurl" class="pb-2 fw-semibold"><i class="fa-solid fa-link me-2"></i> Site URL</label>
                <input type="text" class="form-control " placeholder="Website URL" id="bookurl">
            </div>
            <button onclick="addBook()" class="btn btn-submit mt-4 mx-auto">Submit</button>
            <div id="alertMessage" class="alert alert-danger d-none" role="alert">
                Site Name or URL is not valid, Please follow the rules below :
                <ul class="mt-2 mb-0">
                    <li>Site name must contain at least 3 characters</li>
                    <li>Site URL must be a valid one</li>
                </ul>
            </div>

        </div>
        <table class="table text-center mt-5">
            <thead>
                <tr>
                    <th>Index</th>
                    <th>Website Name</th>
                    <th>Visit</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                
            </tbody>
        </table>
    </div>









    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
